apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sqsqueues.queue.taskapp.io
spec:
  group: queue.taskapp.io
  names:
    kind: SQSQueue
    listKind: SQSQueueList
    plural: sqsqueues
    singular: sqsqueue
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              parameters:
                type: object
                properties:
                  region:
                    type: string
                  fifo:
                    type: boolean
                  deadLetterArn:
                    type: string
              resourceRef:
                type: object
                x-kubernetes-preserve-unknown-fields: true
          status:
            type: object
            properties:
              queueUrl:
                type: string
              queueArn:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
    subresources:
      status: {}
